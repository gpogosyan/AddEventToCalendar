# Деплой на GCP VM: rsync кода + запись /opt/addcalendrbot/.env из GitHub Actions Secrets + update.sh
#
# Settings → Secrets and variables → Actions → Repository secrets:
#
# SSH:
#   VM_HOST, VM_USER, VM_DEPLOY_PATH, VM_SSH_PRIVATE_KEY
#
# Приложение:
#   TELEGRAM_TOKEN, OPENAI_API_KEY, EMAIL_LOGIN, EMAIL_PASSWORD
# Опционально: SMTP_SERVER, SMTP_PORT

name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH and verify connection
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_DEPLOY_PATH: ${{ secrets.VM_DEPLOY_PATH }}
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          : "${VM_HOST:?VM_HOST secret is empty}"
          : "${VM_USER:?VM_USER secret is empty}"
          : "${VM_DEPLOY_PATH:?VM_DEPLOY_PATH secret is empty}"
          : "${VM_SSH_PRIVATE_KEY:?VM_SSH_PRIVATE_KEY secret is empty}"
          mkdir -p ~/.ssh
          printf '%s\n' "$VM_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          if ! ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes -o ConnectTimeout=15 \
            "${VM_USER}@${VM_HOST}" "echo 'SSH OK'"; then
            echo "::error::SSH from GitHub Actions to ${VM_USER}@${VM_HOST} failed."
            echo "::error::Частые причины: (1) в GCP firewall для VM не разрешён вход с интернета на порт 22 — см. README; (2) в secret VM_SSH_PRIVATE_KEY должен быть ПРИВАТНЫЙ ключ (тот же, что в DarionPass), целиком с BEGIN/END."
            exit 1
          fi

      - name: Rsync codebase to VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_DEPLOY_PATH: ${{ secrets.VM_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          RSYNC_EXCLUDES=(
            --exclude='.git'
            --exclude='.github'
            --exclude='.venv'
            --exclude='venv'
            --exclude='__pycache__'
            --exclude='*.pyc'
            --exclude='.DS_Store'
            --exclude='*.db'
            --exclude='.env'
            --exclude='agent-transcripts'
            --exclude='terminals'
            --exclude='deploy.sh'
            --exclude='photo_*.jpg'
            --exclude='photo_*.png'
          )
          rsync -avz --delete "${RSYNC_EXCLUDES[@]}" \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" \
            ./ "${VM_USER}@${VM_HOST}:${VM_DEPLOY_PATH}"

      - name: Push .env from Secrets to /opt and run update.sh
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_DEPLOY_PATH: ${{ secrets.VM_DEPLOY_PATH }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_LOGIN: ${{ secrets.EMAIL_LOGIN }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          set -euo pipefail
          : "${TELEGRAM_TOKEN:?TELEGRAM_TOKEN secret is empty}"
          : "${OPENAI_API_KEY:?OPENAI_API_KEY secret is empty}"
          : "${EMAIL_LOGIN:?EMAIL_LOGIN secret is empty}"
          : "${EMAIL_PASSWORD:?EMAIL_PASSWORD secret is empty}"

          python3 << 'PY' > .env.remote
          import os
          import shlex
          import sys

          def req(name: str) -> str:
              v = (os.environ.get(name) or "").strip()
              if not v:
                  print(f"Error: missing {name}", file=sys.stderr)
                  sys.exit(1)
              return v

          def opt(name: str, default: str) -> str:
              v = (os.environ.get(name) or "").strip()
              return v if v else default

          lines = [
              f"TELEGRAM_TOKEN={shlex.quote(req('TELEGRAM_TOKEN'))}",
              f"OPENAI_API_KEY={shlex.quote(req('OPENAI_API_KEY'))}",
              f"SMTP_SERVER={shlex.quote(opt('SMTP_SERVER', 'smtp.gmail.com'))}",
              f"SMTP_PORT={shlex.quote(opt('SMTP_PORT', '465'))}",
              f"EMAIL_LOGIN={shlex.quote(req('EMAIL_LOGIN'))}",
              f"EMAIL_PASSWORD={shlex.quote(req('EMAIL_PASSWORD'))}",
          ]
          sys.stdout.write("\n".join(lines) + "\n")
          PY

          chmod 600 .env.remote
          scp -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            .env.remote "${VM_USER}@${VM_HOST}:/tmp/addcalendrbot.env"
          rm -f .env.remote

          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "${VM_USER}@${VM_HOST}" \
            "sudo mkdir -p /opt/addcalendrbot && sudo install -m 600 -o addcalendrbot -g addcalendrbot /tmp/addcalendrbot.env /opt/addcalendrbot/.env && rm -f /tmp/addcalendrbot.env && cd \"${VM_DEPLOY_PATH}\" && chmod +x update.sh && sudo ./update.sh"

      - name: Service status
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "${VM_USER}@${VM_HOST}" \
            "sudo systemctl --no-pager status addcalendrbot || true"
